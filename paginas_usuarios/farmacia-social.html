<style>
:root{--a:#7c6bff;--as:#7c6bff20;--r:14px;--f:'Inter',sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#0c0c10;--card:#131318;--sf:#1a1a22;--tx:#f0f0fa;--sub:#8888aa;--br:rgba(255,255,255,0.07)}}
@media(prefers-color-scheme:light){:root{--bg:#f5f5f8;--card:#ffffff;--sf:#ededf2;--tx:#18181e;--sub:#66667a;--br:rgba(0,0,0,0.07)}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
.pg{max-width:480px;margin:0 auto;padding-bottom:60px}
.cv{width:100%;height:185px;overflow:hidden}
.cv img{width:100%;height:100%;object-fit:cover;display:block}
.cv-ph{width:100%;height:185px;background:linear-gradient(135deg,#7c6bff35,#7c6bff08)}
.ph{padding:0 20px;margin-top:-50px;position:relative}
.av{width:96px;height:96px;border-radius:50%;object-fit:cover;box-shadow:0 0 0 3px var(--bg),0 0 0 5px #7c6bff;display:block;background:var(--sf)}
.av-ph{width:96px;height:96px;border-radius:50%;background:var(--sf);box-shadow:0 0 0 3px var(--bg),0 0 0 5px #7c6bff;display:flex;align-items:center;justify-content:center;font-size:38px}
.nm{font-size:1.45rem;font-weight:700;letter-spacing:-.025em;margin-top:14px;line-height:1.2}
.hd{font-size:.8rem;color:var(--sub);margin-top:3px}
.bio{font-size:.9rem;line-height:1.65;color:var(--sub);margin-top:10px}
.bgs{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.bdg{font-size:.68rem;font-weight:700;padding:4px 11px;border-radius:100px;background:var(--as);color:var(--a);border:1px solid #7c6bff33;letter-spacing:.04em;text-transform:uppercase}
.dv{height:1px;background:var(--br);margin:24px 20px}
.sc{padding:0 20px}
.st{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--sub);margin-bottom:12px}
.lbtn{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:var(--r);text-decoration:none;margin-bottom:9px;transition:all .18s ease;position:relative;overflow:hidden}
.lbtn:hover{transform:translateX(3px)}
.lbtn:active{transform:scale(.98)}
.lbtn-fill{background:var(--a);color:#fff}
.lbtn-outline{background:transparent;color:var(--a);border:2px solid var(--a)}
.lbtn-soft{background:var(--as);color:var(--a)}
.lbtn-glass{background:rgba(255,255,255,0.06);color:var(--tx);border:1px solid var(--br);backdrop-filter:blur(14px)}
.li{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lbtn-soft .li,.lbtn-outline .li{background:#7c6bff18}
.lbtn-glass .li{background:rgba(255,255,255,0.08)}
.li svg{width:17px;height:17px}
.ll{flex:1;font-size:.88rem;font-weight:600}
.la{width:15px;height:15px;flex-shrink:0;opacity:.55}
.la svg{width:15px;height:15px}
.sttx{font-size:.9rem;line-height:1.78;color:var(--sub)}
.ft{text-align:center;padding:0 20px;margin-top:44px}
.dl{display:inline-flex;align-items:center;gap:7px;font-size:.74rem;color:var(--sub);text-decoration:none;padding:8px 18px;border-radius:100px;border:1px solid var(--br);background:var(--card);transition:all .2s}
.dl:hover{border-color:#7c6bff55;color:var(--tx)}
.dd{width:6px;height:6px;border-radius:50%;background:var(--a);display:inline-block}
</style>
</head>
